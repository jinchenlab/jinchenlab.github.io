name: Deploy Astro site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Ensure .nojekyll exists in dist
        # GitHub Pages runs Jekyll by default, which strips directories starting
        # with _ (including Astro's _astro/ CSS+JS output). A zero-byte .nojekyll
        # tells GitHub Pages to serve the static build verbatim. Some deploy
        # actions drop dotfiles, so touch it explicitly to be safe.
        run: touch dist/.nojekyll

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true
          clean-exclude: |
            .nojekyll
